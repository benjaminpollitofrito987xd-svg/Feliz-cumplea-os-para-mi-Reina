<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Cumpleaños 🖤</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Georgia', serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Imagen de fondo de la luna y el tiburón */
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.65;
      z-index: 1;
    }

    /* Contenedor principal */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      width: 90%;
      max-width: 600px;
    }

    h1 {
      font-size: 2.2rem;
      text-shadow: 0 0 10px #ff0055, 0 0 20px #800020;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p.sub {
      font-size: 1rem;
      color: #ccc;
      margin-bottom: 20px;
    }

    /* Contador */
    .counter {
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.7);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #800020;
      display: inline-block;
      margin-bottom: 15px;
    }

    /* Área interactiva de murciélagos */
    .bat-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 5;
      pointer-events: none;
    }

    .bat {
      position: absolute;
      font-size: 2.2rem;
      cursor: pointer;
      pointer-events: auto;
      user-select: none;
      transition: transform 0.2s ease, opacity 0.3s;
      filter: drop-shadow(0 0 8px rgba(255, 0, 85, 0.8));
      animation: float 4s ease-in-out infinite alternate;
    }

    .bat:hover {
      transform: scale(1.3);
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(-5deg); }
      100% { transform: translateY(-15px) rotate(5deg); }
    }

    /* Modal / Pop-up para mostrar los mensajes */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: #111;
      border: 2px solid #800020;
      box-shadow: 0 0 25px #800020;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      position: relative;
      animation: popIn 0.3s ease-out;
    }

    @keyframes popIn {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .modal-content p {
      font-size: 1.2rem;
      line-height: 1.5;
      color: #eaeaea;
      margin-bottom: 20px;
    }

    .close-btn {
      background: #800020;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .close-btn:hover {
      background: #b3002d;
    }
  </style>
</head>
<body>

  <!-- Imagen de fondo enviada -->
  <img class="bg-image" src="fondo.jpg" alt="Luna Gótica">

  <div class="container">
    <h1> Feliz 19° Cumpleaños 🖤</h1>
    <p class="sub">Haz clic en los 19 murciélagos voladores para descubrir sus mensajes secretos.</p>
    <div class="counter" id="counter">Murciélagos atrapados: 0 / 19</div>
  </div>

  <!-- Contenedor donde flotarán los 19 murciélagos -->
  <div class="bat-container" id="batContainer"></div>

  <!-- Ventana flotante de mensaje -->
  <div class="modal" id="msgModal">
    <div class="modal-content">
      <p id="modalText"></p>
      <button class="close-btn" onclick="closeModal()">Guardar mensaje 🦇</button>
    </div>
  </div>

  <script>
    // Los 19 mensajes personalizados
    const messages = [
      "1. Eres la luna que ilumina toda mi oscuridad. ✨",
      "2. Contigo, el amor es una aventura eterna. ❤️",
      "3. Eres más rockera que Måneskin y más icónica que Michael Jackson. 🤘🎵",
      "4. Tu sonrisa es mi fantasía favorita. 😊",
      "5. A tu lado, la noche siempre es perfecta. 🌌",
      "6. Nuestro amor es una hermosa leyenda gótica. 🏰🖤",
      "7. Con Kidd Voodoo de fondo y tú a mi lado, no necesito nada más. 🎧🎶",
      "8. Eres la única que hace bailar a mi corazón. 💃🏽💖",
      "9. ¡Feliz cumpleaños número 19, mi amor! 🎉🎈",
      "10. Contigo hasta el fin del mundo y la eternidad. 🌎🚀",
      "11. Eres la calavera más linda y dulce de todas. 😁💀",
      "12. Me tienes más cautivado que el mismísimo Drácula. 🧛🏽‍♂️🥰",
      "13. Tu energía e intensidad son únicas. 🎸❤️",
      "14. ¡Brillas más que cualquier estrella en el cielo! ✨🕴🏽",
      "15. Mi persona favorita en todo el universo. 👗💕🎶",
      "16. Por 19 años más (y toda la eternidad) juntos. ♾️🖤",
      "17. Cada murciélago que tocas es un 'te amo' sincero. 💋",
      "18. Eres la verdadera reina de mi castillo gótico. 👑🏰",
      "19. ¡Que todos tus sueños y deseos se cumplan hoy y siempre! 🎂🎁"
    ];

    let caughtCount = 0;

    // Generar los 19 murciélagos en posiciones aleatorias de la pantalla
    const container = document.getElementById('batContainer');

    messages.forEach((msg, index) => {
      const bat = document.createElement('div');
      bat.classList.add('bat');
      bat.innerHTML = '🦇';
      
      // Posición aleatoria evitando bordes lejanos
      const topPos = Math.floor(Math.random() * 75) + 10;
      const leftPos = Math.floor(Math.random() * 85) + 5;
      
      bat.style.top = topPos + 'vh';
      bat.style.left = leftPos + 'vw';
      bat.style.animationDelay = (Math.random() * 2) + 's';

      // Evento de clic en cada murciélago
      bat.onclick = () => {
        showModal(msg);
        bat.style.opacity = '0';
        bat.style.pointerEvents = 'none';
        caughtCount++;
        document.getElementById('counter').innerText = `Murciélagos atrapados: ${caughtCount} / 19`;
      };

      container.appendChild(bat);
    });

    function showModal(text) {
      document.getElementById('modalText').innerText = text;
      document.getElementById('msgModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('msgModal').style.display = 'none';
    }
  </script>
</body>
</html>
